<div class="ew-wrapper">
  <div class="ew-header">
    <div class="ew-title-row">
      <span class="ew-title">Hasła</span>
      <span class="ew-count">w użyciu: <strong>{{ wordsInUse }}</strong> / {{ words.length }}</span>
      <div class="ew-header-actions">
        <button mat-icon-button (click)="onCheckAll()" [disabled]="wordsInUse == words.length" title="Zaznacz wszystkie">
          <mat-icon>check_circle</mat-icon>
        </button>
        <button mat-icon-button (click)="onUncheckAll()" [disabled]="wordsInUse == 0" title="Odznacz wszystkie">
          <mat-icon>check_circle_outline</mat-icon>
        </button>
        <button mat-icon-button (click)="onBackClick()" title="Zamknij">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>
    <div class="ew-search-row">
      <mat-icon class="ew-search-icon">search</mat-icon>
      <input class="ew-search-input" type="text" placeholder="Szukaj hasła..." [(ngModel)]="searchQuery" />
      <button *ngIf="searchQuery" mat-icon-button class="ew-search-clear" (click)="searchQuery = ''">
        <mat-icon>clear</mat-icon>
      </button>
    </div>
  </div>

  <div class="ew-content">
    <div class="ew-grid">
      <div *ngFor="let word of filteredWords"
           class="ew-tile"
           [class.in-use]="word.inUse"
           [class.excluded]="!word.inUse"
           (click)="toggle(word)">
        {{ word.word | uppercase }}
      </div>
    </div>
    <div *ngIf="filteredWords.length === 0" class="ew-empty">
      Brak haseł pasujących do wyszukiwania
    </div>
  </div>

  <div class="ew-footer">
    <button mat-raised-button class="ew-btn ew-btn-danger" (click)="onDeleteUnused()" [disabled]="wordsInUse == words.length || words.length === 0">
      <span>Usuń<br>nieużywane</span>
    </button>
    <button mat-raised-button class="ew-btn" (click)="onAddNew()">
      <span>Dodaj<br>nowe</span>
    </button>
    <button mat-raised-button class="ew-btn" (click)="onReset()">
      <span>Wczytaj<br>domyślne</span>
    </button>
    <button mat-raised-button class="ew-btn ew-btn-save" (click)="onSave()">
      <span>Zapisz</span>
    </button>
  </div>
</div>
