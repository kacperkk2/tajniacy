<div class="an-wrapper">
  <div class="an-header">
    <button mat-icon-button (click)="onBackClick()" title="Wróć">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span class="an-title">Dodaj nowe hasła</span>
  </div>

  <div class="an-content">
    <p class="an-hint">Wpisz hasła oddzielone spacją lub nową linią</p>
    <form [formGroup]="newWordsForm" class="an-form">
      <textarea
        class="an-textarea"
        formControlName="content"
        placeholder="np. JABŁKO GRUSZKA&#10;SAMOCHÓD"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false">
      </textarea>
    </form>
  </div>

  <div class="an-footer">
    <button mat-raised-button class="an-btn-add" [disabled]="!newWordsForm.get('content')?.value?.trim()" (click)="parseWords()">
      <mat-icon>add</mat-icon>
      Dodaj
    </button>
  </div>
</div>
